<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus — Explorer</title>
  <meta name="description" content="Trustless, client-side block explorer for Nexus, the root chain of the Lattice network. One proof. Every chain." />
  <link rel="icon" href="assets/lattice-mark.svg" />
  <link rel="stylesheet" href="assets/tokens.css?v=3" />
  <link rel="stylesheet" href="assets/style.css?v=2" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="#/">
        <img src="assets/lattice-mark.svg" width="22" height="22" alt="" />
        <span class="wordmark">NEXUS</span>
        <span class="brand-sub">EXPLORER</span>
      </a>
      <form class="search" id="search-form" autocomplete="off">
        <input id="search-input" type="text" placeholder="height / hash / cid / address" aria-label="Search by height, hash, CID, or address" spellcheck="false" />
        <button type="submit">Find</button>
      </form>
    </div>
  </header>

  <div id="net-status" class="net-status"></div>

  <main id="view" class="wrap"></main>

  <footer class="footer wrap">
    <span class="meta">one proof. every chain. — your browser talks to the node directly.</span>
    <nav class="meta">
      <a href="../">lattice</a>
      <a id="node-link" href="#" target="_blank" rel="noopener">node</a>
      <a href="https://github.com/adalinxx/lattice-home" target="_blank" rel="noopener">source</a>
    </nav>
  </footer>

  <script src="assets/config.js?v=2"></script>
  <script src="assets/app.js?v=3"></script>
</body>
</html>
